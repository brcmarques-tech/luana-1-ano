// ── CardFace ──────────────────────────────────────────────────────────────────
const CARD_CSS = `
  .wolf-card{

    background:
      linear-gradient(180deg,
        color-mix(in oklab, var(--tone,#16303a) 86%, #3a5a66) 0%,

  .wc-stars{ text-align:center; padding:11px 0 9px; font-size:13px; letter-spacing:3px;

  .wc-stars .dim{ color: color-mix(in oklab, var(--accent,#e3b45c) 30%, transparent); }

function CardFace({ card }) {
  const stars = [];
  for (let i = 0; i < card.stars.total; i++)
    stars.push(<span key={i} className={i < card.stars.filled ? '' : 'dim'}>★</span>);
  return (
    <div className="wolf-card" style={{ '--tone': card.tone, '--accent': card.accent }}>
      <style>{CARD_CSS}</style>
      <div className="wc-stars">{stars}</div>
      <div className="wc-photo">
        <img src={card.photo} alt={card.name} style={{ objectPosition: card.photoPos || 'center' }} />
      </div>
      <div className="wc-body">
        <div className="wc-name">{card.name}</div>
        <div className="wc-title">{card.title}</div>
        <div className="wc-tags">{card.tags}</div>
        <div className="wc-stats" style={{ gridTemplateColumns: `repeat(${card.stats.length}, 1fr)` }}>
          {card.stats.map((s, i) => (
            <div className="wc-stat" key={i}><span>{s.label}</span><b>{s.value}</b></div>
          ))}
        </div>
        <div className="wc-abilities">
          {card.abilities.map((a, i) => (
            <div className="wc-ab" key={i}>
              <div className="wc-ab-ic">{a.icon}</div>
              <div className="wc-ab-tx"><b>{a.title}</b> — {a.text}</div>
            </div>
          ))}
        </div>
        <div className="wc-quote">"{card.quote}"</div>
      </div>
    </div>

}

// ── HoloCard ──────────────────────────────────────────────────────────────────
function foilGradient(t) {
  const n = t.bands, chroma = (t.saturation / 100) * 0.26, stops = [];
  for (let i = 0; i <= n; i++) {
    const hue = t.hueBase + (i / n) * t.hueSpread;
    stops.push(`oklch(0.78 ${chroma.toFixed(3)} ${hue.toFixed(1)}) ${Math.round(i * t.bandSize)}px`);
  }
  return `repeating-linear-gradient(${t.bandAngle}deg, ${stops.join(', ')})`;
}

function glowGradient(t) {
  const n = 6, chroma = (t.saturation / 100) * 0.3, stops = [];
  for (let i = 0; i <= n; i++) {
    const hue = t.hueBase + (i / n) * t.hueSpread;
    stops.push(`oklch(0.66 ${chroma.toFixed(3)} ${hue.toFixed(1)}) ${Math.round((i / n) * 360)}deg`);
  }
  return `conic-gradient(from calc(var(--mxn) * 360deg), ${stops.join(', ')})`;
}

function noiseURL(freq) {
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='${freq}' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%' height='100%' filter='url(#n)'/></svg>`;
  return `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
}

const T = {
  tiltAmount:15, perspective:900, hoverScale:105, ease:420,
  foilIntensity:50, foilBlend:'color-dodge', saturation:42,
  hueBase:250, hueSpread:300, bands:11, bandSize:16, bandAngle:115,
  hueTravel:55, foilFocus:78,
  glareIntensity:50, glareSize:46, glareBlend:'soft-light',
  noiseAmount:15, noiseScale:0.85, noiseBlend:'overlay',
  glowIntensity:60, glowSize:70, idleShimmer:true,
};

const HOLO_CSS = `
  .holo{ position:relative; z-index:1; perspective:${T.perspective}px; }
  .card-root{
    position:relative; transform-style:preserve-3d;
    transition: transform ${T.ease}ms cubic-bezier(.22,.61,.36,1);
    transform: rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg))
      scale(calc(1 + ${((T.hoverScale-100)/100).toFixed(3)} * var(--active,0)));
    will-change:transform;
  }
  .glow{
    position:absolute; inset:-9%; border-radius:30px;
    background:var(--glow-bg);
    filter:blur(${T.glowSize}px);
    opacity:calc((0.22 + 0.78 * var(--active,0)) * ${(T.glowIntensity/100).toFixed(3)});
    transform:translateZ(-60px) scale(calc(0.9 + 0.14 * var(--active,0)));
    transition:opacity ${T.ease}ms ease, transform ${T.ease}ms ease; z-index:0;
  }
  .card{
    position:relative; z-index:1; width:min(420px, 90vw); border-radius:22px;
    isolation:isolate; overflow:hidden; background:#0c0f12;
    box-shadow:
      0 1px 0 rgba(255,255,255,.10) inset,
      0 0 0 1px rgba(255,255,255,.06),
      0 40px 80px -28px rgba(0,0,0,.85),
      0 12px 30px -14px rgba(0,0,0,.7);
  }
  .card-content{ position:relative; z-index:0; }
  .layer{ position:absolute; inset:0; pointer-events:none; }
  .layer.foil{
    background:var(--foil-bg); background-size:115% 115%;
    background-position:calc(var(--mx,50%) * 1.4) calc(var(--my,50%) * 1.4);
    mix-blend-mode:${T.foilBlend};
    opacity:${(T.foilIntensity/100).toFixed(3)};
    filter:hue-rotate(calc((var(--mxn,.5) - 0.5) * ${T.hueTravel} * 1deg));
    -webkit-mask-image:radial-gradient(circle at var(--mx,50%) var(--my,50%),
      #000 0%, #000 calc(${T.foilFocus}% * 0.55), transparent ${T.foilFocus}%);
    mask-image:radial-gradient(circle at var(--mx,50%) var(--my,50%),
      #000 0%, #000 calc(${T.foilFocus}% * 0.55), transparent ${T.foilFocus}%);
  }
  .layer.glare{
    background:radial-gradient(circle at var(--mx,50%) var(--my,50%),
      rgba(255,255,255,${(T.glareIntensity/100).toFixed(3)}) 0%,
      rgba(255,255,255,${(T.glareIntensity/100*0.35).toFixed(3)}) calc(${T.glareSize}% * 0.4),
      transparent ${T.glareSize}%);
    mix-blend-mode:${T.glareBlend};
  }
  .layer.noise{
    background-image:var(--noise-bg); background-size:160px 160px;
    opacity:${(T.noiseAmount/100).toFixed(3)}; mix-blend-mode:${T.noiseBlend};
  }
  .layer.rim{
    border-radius:22px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.06), inset 0 1px 1px rgba(255,255,255,.12);
    background:linear-gradient(calc(var(--ry,0deg) * -2 + 135deg),
      rgba(255,255,255,calc(0.10 * var(--active,0))) 0%, transparent 40%);
  }
`;

const VARS = {
  '--foil-bg': foilGradient(T),
  '--glow-bg': glowGradient(T),
  '--noise-bg': noiseURL(T.noiseScale),
};

function HoloCard({ card }) {
  const rootRef = React.useRef(null);
  const holoRef = React.useRef(null);
  const st = React.useRef({ tx:.5, ty:.5, x:.5, y:.5, active:0, ta:0, idle: Math.random() * 6 });

  React.useEffect(() => {
    let raf;
    const tick = () => {
      const s = st.current;
      if (s.ta < 0.5) {
        s.idle += 0.011;
        s.tx = 0.5 + Math.cos(s.idle) * 0.3;
        s.ty = 0.5 + Math.sin(s.idle * 0.8) * 0.24;
      }
      s.x += (s.tx - s.x) * 0.12;
      s.y += (s.ty - s.y) * 0.12;
      s.active += (s.ta - s.active) * 0.1;
      const el = rootRef.current;
      if (el) {
        el.style.setProperty('--mx', (s.x * 100).toFixed(2) + '%');
        el.style.setProperty('--my', (s.y * 100).toFixed(2) + '%');
        el.style.setProperty('--mxn', s.x.toFixed(4));
        el.style.setProperty('--myn', s.y.toFixed(4));
        el.style.setProperty('--rx', ((0.5 - s.y) * T.tiltAmount * 2).toFixed(2) + 'deg');
        el.style.setProperty('--ry', ((s.x - 0.5) * T.tiltAmount * 2).toFixed(2) + 'deg');
        el.style.setProperty('--active', s.active.toFixed(3));
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  const onMove = (e) => {
    const r = holoRef.current.getBoundingClientRect();
    st.current.tx = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));
    st.current.ty = Math.min(1, Math.max(0, (e.clientY - r.top) / r.height));
    st.current.ta = 1;
  };
  const onLeave = () => { st.current.ta = 0; };

  return (
    <div className="holo" ref={holoRef} onPointerMove={onMove} onPointerLeave={onLeave}>
      <style>{HOLO_CSS}</style>
      <div className="card-root" ref={rootRef} style={VARS}>
        <div className="glow" />
        <div className="card">
          <div className="card-content"><CardFace card={card} /></div>
          <div className="layer foil" />
          <div className="layer glare" />
          <div className="layer noise" />
          <div className="layer rim" />
        </div>
      </div>
    </div>
  );
}

const id = location.hash.slice(1);
const card = CARDS[id] || CARDS['luana'];
ReactDOM.createRoot(document.getElementById('root')).render(<HoloCard card={card} />);
</script>
